<!-- Waybill Input Modal -->
<div id="awb-modal" class="modal-overlay fixed inset-0 bg-coffee-950/40 z-[100] items-center justify-center p-4 backdrop-blur-2xl transition-all duration-500 opacity-0 pointer-events-none flex">
    <div class="bg-white w-full max-w-sm rounded-[3.5rem] shadow-[0_40px_100px_-15px_rgba(0,0,0,0.3)] overflow-hidden flex flex-col border border-coffee-100 transform scale-95 transition-all duration-500">

                    <label class="block text-coffee-400 text-[9px] font-black uppercase tracking-[0.3em] mb-3 ml-2 group-focus-within:text-accent-gold transition-colors">Waybill Number</label>
                    <input type="text" id="awb-number" class="w-full px-6 py-4 bg-white border border-coffee-100 rounded-2xl outline-none font-mono font-black uppercase tracking-widest focus:ring-4 focus:ring-accent-gold/10 focus:border-accent-gold transition-all text-sm" placeholder="e.g. SBJ-12345678">
