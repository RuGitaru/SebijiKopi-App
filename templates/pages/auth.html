<div id="page-login" class="page-wrapper">
    <div class="min-h-screen flex items-center justify-center p-4 py-10 relative overflow-hidden selection:bg-accent-gold/30 w-full">
        <!-- Center Modal -->
        <div id="form-login-container" class="bg-white p-8 md:p-12 rounded-[3rem] shadow-[0_50px_100px_-15px_rgba(0,0,0,0.5)] w-full max-w-xl relative transition-all duration-700 border border-white/20 animate-fade-in-up max-h-[90vh] overflow-y-auto custom-scrollbar">
            <button onclick="navigateTo('page-landing')" class="absolute top-8 left-8 text-coffee-300 hover:text-accent-gold transition-all text-[9px] font-black uppercase tracking-[0.4em] flex items-center gap-3 group">
                <svg class="w-4 h-4 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Kembali
            </button>
            
            <div class="text-center mb-8 mt-6">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-coffee-950 text-accent-gold rounded-[1.5rem] mb-6 shadow-2xl shadow-coffee-950/20 rotate-3 group-hover:rotate-0 transition-transform duration-500">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <h2 class="text-4xl font-black text-coffee-950 font-display uppercase tracking-tight leading-none">Partner Access</h2>
                <p class="text-[9px] text-coffee-400 font-black uppercase tracking-[0.4em] mt-1">Secure access to your supply portal</p>
            </div>

            <div id="login-error" class="hidden bg-red-50 text-red-600 p-5 rounded-2xl mb-10 text-[10px] font-black uppercase tracking-widest text-center border border-red-100 shadow-sm animate-shake">
                Kredensial tidak valid
            </div>

            <div class="space-y-8">
                <div class="group">
                    <label class="block text-coffee-300 text-[9px] font-black uppercase tracking-[0.3em] mb-3 px-1">Identification</label>
                    <input type="text" id="input-username" class="w-full px-8 py-5 bg-accent-cream/50 border-2 border-transparent rounded-[1.5rem] focus:outline-none focus:border-accent-gold focus:bg-white transition-all duration-500 font-bold text-coffee-950 placeholder-coffee-200" placeholder="Username">
                </div>
                <div class="group">
                    <label class="block text-coffee-300 text-[9px] font-black uppercase tracking-[0.3em] mb-3 px-1">Password</label>
                    <input type="password" id="input-password" class="w-full px-8 py-5 bg-accent-cream/50 border-2 border-transparent rounded-[1.5rem] focus:outline-none focus:border-accent-gold focus:bg-white transition-all duration-500 font-bold text-coffee-950 placeholder-coffee-200" placeholder="••••••••" onkeypress="if(event.key === 'Enter') processLogin()">
                </div>
                <button onclick="processLogin()" class="w-full bg-coffee-950 text-white font-black py-6 rounded-[1.5rem] hover:bg-black transition-all duration-700 shadow-2xl shadow-coffee-950/20 uppercase tracking-[0.4em] text-[11px] active:scale-95 group mt-4 btn-premium">
                    Authenticate <span class="group-hover:translate-x-2 inline-block transition-transform ml-3">→</span>
                </button>
                
                <div class="text-center text-[9px] font-black text-coffee-400 mt-2 uppercase tracking-[0.3em]">
                    New Partner? <button onclick="toggleAuth('register')" class="text-accent-gold hover:text-coffee-950 transition-all font-black ml-2 underline underline-offset-8">Create B2B Account</button>
                </div>
            </div>

            <div class="mt-10 p-8 bg-accent-cream/50 border border-coffee-100 rounded-[2.5rem] text-[9px] font-bold uppercase tracking-widest leading-loose text-coffee-400">
                <div class="flex items-center gap-3 mb-5">
                    <span class="w-2 h-2 bg-accent-gold rounded-full animate-pulse"></span>
                    <span class="text-coffee-950 font-black">Development Access</span>
                </div>
                <div class="grid grid-cols-2 gap-6">
                    <div class="space-y-3">
                        <p class="text-coffee-300 opacity-60">Corporate:</p>
                        <ul class="space-y-2">
                            <li class="text-coffee-950 hover:text-accent-gold cursor-pointer transition-all" onclick="fillLogin('cust1')">cust1 (Client)</li>
                            <li class="text-coffee-950 hover:text-accent-gold cursor-pointer transition-all" onclick="fillLogin('admin1')">admin1 (Executive)</li>
                        </ul>
                    </div>
                    <div class="space-y-3">
                        <p class="text-coffee-300 opacity-60">Regional Hub:</p>
                        <ul class="space-y-2">
                            <li class="text-coffee-950 hover:text-accent-gold cursor-pointer transition-all" onclick="fillLogin('spv_bks')">spv_bks (Lead)</li>
                            <li class="text-coffee-950 hover:text-accent-gold cursor-pointer transition-all" onclick="fillLogin('op1_bks')">op1_bks (Staff)</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <div id="form-register-container" class="hidden bg-white p-8 md:p-12 rounded-[3rem] shadow-[0_50px_100px_-15px_rgba(0,0,0,0.5)] w-full max-w-xl relative transition-all duration-700 border border-white/20 animate-fade-in-up max-h-[90vh] overflow-y-auto custom-scrollbar">
            <button onclick="toggleAuth('login')" class="absolute top-8 left-8 text-coffee-300 hover:text-accent-gold transition-all text-[9px] font-black uppercase tracking-[0.4em] flex items-center gap-3 group">
                <svg class="w-4 h-4 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Batal
            </button>
            <div class="text-center mb-8 mt-6">
                <h2 class="text-4xl font-black text-coffee-950 font-display uppercase tracking-tight">Apply for Partnership</h2>
                <p class="text-[9px] text-coffee-400 font-black uppercase tracking-[0.4em] mt-1">Join our exclusive supply network</p>
            </div>
            <form id="register-form" onsubmit="event.preventDefault(); processRegister();" class="space-y-6">
                <div>
                    <label class="block text-coffee-300 text-[9px] font-black uppercase tracking-[0.3em] mb-2 px-1">Business Name</label>
                    <input type="text" id="reg-name" required class="w-full px-7 py-4 bg-accent-cream/50 border-2 border-transparent rounded-[1.5rem] focus:outline-none focus:border-accent-gold focus:bg-white transition-all font-bold text-coffee-950">
                </div>
                <div>
                    <label class="block text-coffee-300 text-[9px] font-black uppercase tracking-[0.3em] mb-2 px-1">Email Address</label>
                    <input type="email" id="reg-email" required class="w-full px-7 py-4 bg-accent-cream/50 border-2 border-transparent rounded-[1.5rem] focus:outline-none focus:border-accent-gold focus:bg-white transition-all font-bold text-coffee-950">
                </div>
                <div>
                    <label class="block text-coffee-300 text-[9px] font-black uppercase tracking-[0.3em] mb-2 px-1">Shipping Logistics Address</label>
                    <textarea id="reg-address" required rows="2" class="w-full px-7 py-4 bg-accent-cream/50 border-2 border-transparent rounded-[1.5rem] focus:outline-none focus:border-accent-gold focus:bg-white transition-all font-bold text-coffee-950"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="block text-coffee-300 text-[9px] font-black uppercase tracking-[0.3em] mb-2 px-1">Contact No.</label>
                        <input type="tel" id="reg-phone" required class="w-full px-7 py-4 bg-accent-cream/50 border-2 border-transparent rounded-[1.5rem] focus:outline-none focus:border-accent-gold focus:bg-white transition-all font-bold text-coffee-950">
                    </div>
                    <div>
                        <label class="block text-coffee-300 text-[9px] font-black uppercase tracking-[0.3em] mb-2 px-1">Access Identity</label>
                        <input type="text" id="reg-username" required class="w-full px-7 py-4 bg-accent-cream/50 border-2 border-transparent rounded-[1.5rem] focus:outline-none focus:border-accent-gold focus:bg-white transition-all font-bold text-coffee-950">
                    </div>
                </div>
                <div>
                    <label class="block text-coffee-300 text-[9px] font-black uppercase tracking-[0.3em] mb-2 px-1">Master Password</label>
                    <input type="password" id="reg-password" required class="w-full px-7 py-4 bg-accent-cream/50 border-2 border-transparent rounded-[1.5rem] focus:outline-none focus:border-accent-gold focus:bg-white transition-all font-bold text-coffee-950">
                </div>
                <button type="submit" class="w-full bg-coffee-950 text-white font-black py-6 rounded-[1.5rem] hover:bg-black transition-all shadow-2xl shadow-coffee-950/20 uppercase tracking-[0.4em] text-[11px] mt-6 btn-premium">
                    Submit Application
                </button>
                <div class="text-center text-[9px] font-black text-coffee-400 mt-2 uppercase tracking-[0.3em]">
                    Already a Partner? <button type="button" onclick="toggleAuth('login')" class="text-accent-gold hover:text-coffee-950 transition-all font-black ml-2 underline underline-offset-8">Login Here</button>
                </div>
            </form>
        </div>
    </div>
</div>
